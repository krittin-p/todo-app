rules:
  # ห้าม console.log ใน production
  - id: no-console-log
    pattern: console.log(...)
    message: "ลบ console.log ออกก่อน merge"
    severity: WARNING
    languages: [javascript, typescript]

  # ห้าม eval()
  - id: no-eval
    pattern: eval(...)
    message: "ห้ามใช้ eval() เด็ดขาด อันตรายมาก"
    severity: ERROR
    languages: [javascript, typescript]

  # ห้าม hardcode password
  - id: no-hardcoded-password
    patterns:
      - pattern: $VAR = "..."
      - metavariable-regex:
          metavariable: $VAR
          regex: ".*(password|passwd|secret|api_key|token).*"
    message: "ห้าม hardcode password/secret ใช้ environment variable แทน"
    severity: ERROR
    languages: [javascript, typescript, python]

  # ห้าม print() ใน Python
  - id: no-print-python
    pattern: print(...)
    message: "ลบ print() ออกก่อน merge ใช้ logging แทน"
    severity: WARNING
    languages: [python]

  # ห้าม exec() ใน Python
  - id: no-exec-python
    pattern: exec(...)
    message: "ห้ามใช้ exec() อันตรายมาก"
    severity: ERROR
    languages: [python]

  # ห้าม innerHTML กับ dynamic data
  - id: no-inner-html
    pattern: $X.innerHTML = $Y
    message: "อย่าใช้ innerHTML กับ untrusted data — ใช้ textContent แทน"
    severity: ERROR
    languages: [javascript, typescript]

  # ห้าม outerHTML กับ dynamic data
  - id: no-outer-html
    pattern: $X.outerHTML = $Y
    message: "อย่าใช้ outerHTML กับ untrusted data — XSS risk"
    severity: ERROR
    languages: [javascript, typescript]

  # ห้าม document.write
  - id: no-document-write
    pattern: document.write(...)
    message: "ห้ามใช้ document.write() — XSS risk"
    severity: ERROR
    languages: [javascript, typescript]
